// ログイン済みセッションの復元処理（UBSアプリのonAuthStateChangedと同等の役割）
async function restoreSession(session){
  user = session?.user ?? null;
  if(user){
    const invToken = sessionStorage.getItem('invite_token');
    if(invToken){ pendingInviteToken=invToken; sessionStorage.removeItem('invite_token'); }
    try {
      await loadMyTeams();
    } catch(e) {
      view="login"; render(); return;
    }
    if(pendingInviteToken){ await handleInviteToken(pendingInviteToken); return; }
    if(myTeams.length===0){ view="team_select"; render(); }
    else if(myTeams.length===1){ await selectTeam(myTeams[0]); }
    else { view="team_select"; render(); }
  } else {
    stopListeners();
    tournaments=[]; players=[]; currentTeam=null; myTeams=[];
    view="login"; render();
  }
}

// ── Auth state management ────────────────────────────────────────────
// 【重要】onAuthStateChange のコールバックは Supabase 内部の Web Lock を
// 保持したまま呼ばれる。このコールバック内で Supabase クエリを await すると
// lock が5秒タイムアウト → AbortError になる。
// 解決策: setTimeout(fn, 0) でlockが解放された後に処理を逃がす。
//
// 【二重実行防止】
// SIGNED_IN と INITIAL_SESSION が連続して同期的に発火するため boolean フラグでは
// setTimeout 実行前にすり抜けてしまう。
// 代わりに「処理済みセッションの user_id」を記録し、同一ユーザーの重複イベントを弾く。
let _handledUserId = null;
sb.auth.onAuthStateChange((event, session) => {
  if(event === 'INITIAL_SESSION' || event === 'SIGNED_IN'){
    const uid = session?.user?.id ?? null;
    if(uid && uid === _handledUserId){ return; }
    _handledUserId = uid;
    const _session = session;
    const _hasToken = window.location.hash.includes('access_token');
    setTimeout(async () => {
      if(event === 'SIGNED_IN' && _hasToken){
        history.replaceState(null, '', window.location.pathname);
      }
      await restoreSession(_session ?? null);
    }, 0);
    return;
  }
  if(event === 'SIGNED_OUT'){
    _handledUserId = null;
    setTimeout(async () => {
      await restoreSession(null);
    }, 0);
    return;
  }
});

function sortPlayers(arr){
  return [...arr].sort((a,b)=>{
    const ga=calcGrade(a.enroll_year)??0, gb=calcGrade(b.enroll_year)??0;
    if(gb!==ga) return gb-ga;
    return (a.join_order??9999)-(b.join_order??9999);
  });
}
function calcGrade(enrollYear){
  const fy = filterYr!==null?filterYr:fiscalYear(today());
  const grade=fy-enrollYear+1;
  return grade>=1&&grade<=6?grade:null;
}
function gradeLabel(enrollYear){
  const g=calcGrade(enrollYear);
  return g?`${g}年`:"卒";
}

function getYears(){ return [...new Set(tournaments.map(t=>fiscalYear(t.date)))].sort((a,b)=>b-a); }
function getFiltered(){
  let ts=filterYr!==null?tournaments.filter(t=>fiscalYear(t.date)===filterYr):tournaments;
  if(filterGr) ts=ts.filter(t=>t.grade===filterGr);
  if(filterGen) ts=ts.filter(t=>(t.gender||"男子")===filterGen);
  return ts.map(t=>({...t,games:(t.games||[]).filter(g=>search.trim()?g.opponent.startsWith(search.trim()):true)}))
    .filter(t=>t.games.length>0||!search.trim());
}
function getStats(filt){
  let w=0,l=0,d=0;
  filt.forEach(t=>t.games.forEach(g=>{const r=res(g);if(r==="win")w++;else if(r==="lose")l++;else d++;}));
  return {tc:filt.length,tot:w+l+d,w,l,d};
}
function getEscSummary(filt){
  const m={};
  filt.forEach(t=>(t.escorts||[]).filter(e=>e.name).forEach(e=>{m[e.name]=(m[e.name]||0)+escScore(e.dir);}));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

let deferredPrompt=null, pwaTimerStarted=false;

function shouldShowPwaBanner(){
  if(window.matchMedia("(display-mode: standalone)").matches) return false;
  if(window.navigator.standalone===true) return false;
  const count=parseInt(localStorage.getItem("loginCount")||"0")+1;
  localStorage.setItem("loginCount",String(count));
  return count%5===0;
}
function showPwaBannerAfterDelay(){
  if(pwaTimerStarted) return;
  if(!shouldShowPwaBanner()) return;
  pwaTimerStarted=true;
  setTimeout(()=>{const b=document.getElementById("pwa-banner");if(b)b.style.display="flex";},3000);
}
function dismissPwaBanner(){ const b=document.getElementById("pwa-banner");if(b)b.style.display="none"; }
async function triggerAndroidInstall(){
  if(deferredPrompt){ deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==="accepted")dismissPwaBanner();deferredPrompt=null; }
}
window.dismissPwaBanner=dismissPwaBanner;
window.triggerAndroidInstall=triggerAndroidInstall;

function render(){

  const focused=document.activeElement;
  const wasSearch=focused&&focused.placeholder==="相手チームを検索";
  root.innerHTML="";
  root.appendChild(build());
  if(wasSearch){
    const si=root.querySelector("input[placeholder='相手チームを検索']");
    if(si){si.focus();si.setSelectionRange(si.value.length,si.value.length);}
  }
}

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  if(tag==="button"&&!attrs.type) e.setAttribute("type","button");
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}

            if(t2.venue) tMeta.appendChild(el("span",{style:{color:"#6b7280"}},[`📍${t2.venue}`]));
            tBlock.appendChild(tMeta);

              const rb=RB[res(g)];

  if(analTab==="venue"){
    const venueMap={};
    filt.forEach(t=>{const vk=t.venue||"（未記録）";if(!venueMap[vk])venueMap[vk]={tc:0,games:0,w:0,l:0,d:0,tournaments:[]};venueMap[vk].tc++;venueMap[vk].games+=(t.games||[]).length;const tw2=t.games.filter(g=>res(g)==="win").length;const tl2=t.games.filter(g=>res(g)==="lose").length;const td3=t.games.filter(g=>res(g)==="draw").length;venueMap[vk].w+=tw2;venueMap[vk].l+=tl2;venueMap[vk].d+=td3;venueMap[vk].tournaments.push(t);});
    const venueList=Object.entries(venueMap).sort((a,b)=>b[1].games-a[1].games);
    if(venueList.length===0){body.appendChild(el("div",{style:S.emp},["データがありません"]));}

      const isSelected=analVenueSel===venue;

      const left=el("div",{});
      left.appendChild(el("div",{style:{fontWeight:"800",fontSize:"14px",color:"#0f2744"}},[`📍 ${venue}`]));
      const nums2=el("div",{style:{display:"flex",gap:"10px",marginTop:"3px"}});
      [[`${v.games}試合`,"#6b7280"],[`${v.w}勝`,"#059669"],[`${v.l}敗`,"#dc2626"]].forEach(([txt,c])=>nums2.appendChild(el("span",{style:{fontSize:"12px",color:c,fontWeight:"600"}},[txt])));
      left.appendChild(nums2);hd.appendChild(left);
      hd.appendChild(el("span",{style:{fontSize:"14px",color:"#94a3b8"}},[ isSelected?"▼":"▶"]));
      card.appendChild(hd);
      if(isSelected){
        const det=el("div",{style:{padding:"10px 14px"}});
        v.tournaments.forEach(t2=>{
          const tw3=t2.games.filter(g=>res(g)==="win").length,tl3=t2.games.filter(g=>res(g)==="lose").length;
          const tRow=el("div",{style:{borderBottom:"1px solid #f1f5f9",paddingBottom:"8px",marginBottom:"8px"}});

          tRow.appendChild(tm);det.appendChild(tRow);
        });
        card.appendChild(det);
      }
      body.appendChild(card);
    });
  }

  if(analTab==="esc"){
    const summary=getEscSummary(filt);
    if(summary.length===0){
      body.appendChild(el("div",{style:S.emp},["引率記録がありません"]));
    } else {
      const escTourMap={};
      filt.forEach(t=>{
        (t.escorts||[]).filter(e=>e.name).forEach(e=>{
          if(!escTourMap[e.name]) escTourMap[e.name]=[];
          escTourMap[e.name].push(t);
        });
      });
      summary.forEach(([n,c])=>{
        const isSelected=analEscSel===n;
        const card=el("div",{style:{background:"#fff",borderRadius:"14px",marginBottom:"10px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",overflow:"hidden"}});
        const row=el("div",{
          style:{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",background:isSelected?"#eff6ff":"#fff"},
          onClick:()=>{analEscSel=isSelected?null:n;render();}
        });
        const nameWrap=el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
        nameWrap.appendChild(el("span",{style:{fontSize:"16px",fontWeight:"600",color:"#1f2937"}},[`👤 ${n}`]));
        nameWrap.appendChild(el("span",{style:{fontSize:"11px",color:isSelected?"#3b82f6":"#94a3b8",fontWeight:"600"}},[isSelected?"▼":"▶"]));
        row.appendChild(nameWrap);
        row.appendChild(el("span",{style:{fontSize:"24px",fontWeight:"900",color:"#0f2744"}},[`${c}回`]));
        card.appendChild(row);
        if(isSelected){
          const tours=(escTourMap[n]||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
          const detail=el("div",{style:{background:"#f8fafc",borderTop:"1px solid #f1f5f9",padding:"10px 14px"}});
          if(tours.length===0){
            detail.appendChild(el("div",{style:{fontSize:"13px",color:"#94a3b8",textAlign:"center",padding:"10px 0"}},["大会情報がありません"]));
          } else {
            tours.forEach((t,i)=>{
              const tGender=t.gender||"男子";
              const genderColor=tGender==="男子"?"#1d4ed8":"#be185d";
              const genderBg=tGender==="男子"?"#dbeafe":"#fce7f3";
              const esc=(t.escorts||[]).find(e=>e.name===n);
              const dirLabel=esc?(esc.dir==="round"?"往復":"片道"):"";
              const tRow=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"9px 0",borderBottom:i<tours.length-1?"1px solid #f1f5f9":"none"}});
              tRow.appendChild(el("span",{style:{fontSize:"12px",color:"#6b7280",flexShrink:"0",minWidth:"54px",fontWeight:"600"}},[fmtD(t.date)]));
              const badges=el("div",{style:{display:"flex",gap:"4px",flexShrink:"0"}});
              badges.appendChild(el("span",{style:{background:"#dbeafe",color:"#1d4ed8",fontSize:"10px",fontWeight:"700",padding:"2px 6px",borderRadius:"4px"}},[t.grade]));
              badges.appendChild(el("span",{style:{background:genderBg,color:genderColor,fontSize:"10px",fontWeight:"700",padding:"2px 6px",borderRadius:"4px"}},[tGender]));
              tRow.appendChild(badges);
              const nameBlock=el("div",{style:{flex:"1",minWidth:"0"}});
              nameBlock.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"700",color:"#0f2744",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[t.name]));
              if(t.venue) nameBlock.appendChild(el("div",{style:{fontSize:"11px",color:"#6b7280",marginTop:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[`📍 ${t.venue}`]));
              tRow.appendChild(nameBlock);
              if(dirLabel) tRow.appendChild(el("span",{style:{fontSize:"11px",color:"#94a3b8",flexShrink:"0"}},[dirLabel]));
              detail.appendChild(tRow);
            });
          }
          card.appendChild(detail);
        }
        body.appendChild(card);
      });
      body.appendChild(el("div",{style:{fontSize:"12px",color:"#94a3b8",marginTop:"4px",textAlign:"center"}},["往復＝1回、片道＝0.5回でカウント"]));
    }
  }

  wrap.appendChild(body);
  return wrap;
}

          },["編集"]));

    body.appendChild(mkLabel("ふりがな（任意）"));
    body.appendChild(mkInput("やまだ たろう",pf.furigana,v=>{pf.furigana=v;}));

// ── Game Detail ───────────────────────────────────────────────────────
function buildGD(){
  const t=tournaments.find(x=>x.id===sel);
  const g=selGame;
  if(!t||!g){view="td";render();return el("div",{});}
  const rb=RB[res(g)];
  const wrap=el("div",{});
  wrap.appendChild(mkHdr(`vs ${g.opponent}`,t.name,true,()=>{view="td";render();}));
  const body=el("div",{style:S.body});

  // スコアカード
  const sc=el("div",{style:{background:"#fff",borderRadius:"14px",padding:"20px",marginBottom:"12px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}});
  sc.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",marginBottom:"8px"}},[
    el("span",{style:{width:"32px",height:"32px",borderRadius:"8px",background:rb.bg,color:rb.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",fontWeight:"900"}},[rb.t]),
    el("span",{style:{fontSize:"32px",fontWeight:"900",color:"#0f2744"}},[`${g.our_score}–${g.their_score}`])
  ]));
  if(g.memo) sc.appendChild(el("div",{style:{fontSize:"13px",color:"#6b7280",fontStyle:"italic"}},[`📝 ${g.memo}`]));
  body.appendChild(sc);

  // スタッツ
  const stats=(g.stats||[]);
  if(stats.length>0){
    const tbl=el("div",{style:{background:"#fff",borderRadius:"14px",marginBottom:"12px",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}});
    const thead=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 44px 44px 44px",gap:"0",padding:"8px 14px",borderBottom:"1px solid #f1f5f9",background:"#f8fafc"}});
    ["選手","分","点","Reb"].forEach((h,i)=>thead.appendChild(el("span",{style:{fontSize:"11px",fontWeight:"700",color:"#6b7280",textAlign:i>0?"center":"left"}},[h])));
    tbl.appendChild(thead);
    const sortedStats=[...stats].sort((a,b)=>{
      const pa=players.find(x=>x.id===a.player_id),pb=players.find(x=>x.id===b.player_id);
      const ga2=pa?calcGrade(pa.enroll_year)??0:0,gb2=pb?calcGrade(pb.enroll_year)??0:0;
      if(gb2!==ga2) return gb2-ga2;
      return (pa?.join_order??9999)-(pb?.join_order??9999);
    });
    sortedStats.forEach((s,i)=>{
      const p=players.find(x=>x.id===s.player_id);
      const row2=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 44px 44px 44px",gap:"0",padding:"10px 14px",borderBottom:i<stats.length-1?"1px solid #f9fafb":"none",alignItems:"center"}});
      const nameWrap=el("div",{style:{display:"flex",alignItems:"baseline",gap:"5px",minWidth:"0"}});
      nameWrap.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"600",color:"#1f2937",whiteSpace:"nowrap"}},[p?p.name:"不明"]));
      if(p?.furigana) nameWrap.appendChild(el("span",{style:{fontSize:"10px",color:"#b0b8c4",fontWeight:"400",whiteSpace:"nowrap"}},[p.furigana]));
      row2.appendChild(nameWrap);
      [s.play_time,s.points,s.rebounds].forEach(v=>row2.appendChild(el("span",{style:{fontSize:"14px",fontWeight:"700",color:"#0f2744",textAlign:"center"}},[String(v??0)])));
      tbl.appendChild(row2);
    });
    body.appendChild(tbl);
  }

  if(isAdmin){
    body.appendChild(el("button",{
      style:{width:"100%",background:"#f3f4f6",color:"#374151",border:"1.5px solid #d1d5db",borderRadius:"12px",padding:"13px",fontSize:"14px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"},
      onClick:()=>{sf={};(g.stats||[]).forEach(s=>{sf[s.player_id]={playTime:s.play_time??0,points:s.points??0,rebounds:s.rebounds??0};});view="gs";render();}
    },["✏️ スタッツを入力"]));
  }
  body.appendChild(el("div",{style:{height:"20px"}}));
  wrap.appendChild(body);
  return wrap;
}

  },["🔄 チーム選択画面へ"]));

  // ログアウト
  body.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"700",color:"#6b7280",marginBottom:"10px"}},["アカウント"]));
  body.appendChild(el("div",{style:{background:"#fff",borderRadius:"14px",padding:"16px",marginBottom:"12px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}},[ el("div",{style:{fontSize:"13px",color:"#94a3b8",marginBottom:"8px"}},[user?.email||""]), mkBtn("ログアウト",logout,{background:"#f3f4f6",color:"#374151"}) ]));

  wrap.appendChild(body);
  return wrap;
}

// ── Init ──────────────────────────────────────────────────────────────
checkUrlForInvite();
render();

</script>
